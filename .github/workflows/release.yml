name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Verify module
        run: go build ./...
      - name: Vet
        run: go vet ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  # pkg.go.dev indexes modules automatically on tag push; no upload step needed.
  trigger-proxy:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Warm pkg.go.dev / proxy cache
        run: |
          TAG="${GITHUB_REF_NAME}"
          curl -fsSL "https://proxy.golang.org/github.com/ONQL/onqlclient-go/@v/${TAG}.info" || true
